name: Google Maps Scraper

on:
  schedule:
    - cron: "50 17 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04        # ← fixed: avoids libasound2 issue on 24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers + deps
        run: |
          playwright install chromium
          playwright install-deps chromium   # works cleanly on 22.04

      - name: Run scraper
        run: python main.py --source google_maps --specialty "dentist" --city "Pune" --max 20 --pause 5 --channel chrome

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: outputs/